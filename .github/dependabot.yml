version: 2

updates:
  # Update npm packages
  - package-ecosystem: npm
    directory: /
    open-pull-requests-limit: 10

    # Group packages into shared PR
    groups:
      core:
        patterns:
          - '@defra/*'
          - '@hapi/*'
          - 'croner'
          - 'hapi*'
          - 'joi'
          - 'mongoose'
          - 'sqs-consumer'

      build:
        patterns:
          - '@babel/*'
          - 'autoprefixer'

      lint:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - 'neostandard'
          - 'prettier'
          - 'stylelint'
          - 'stylelint-*'

      logging:
        patterns:
          - '*-pino'
          - '*-pino-format'
          - 'pino'
          - 'pino-*'

      tools:
        patterns:
          - '@aws-sdk/*'
          - 'aws*'
          - 'convict'
          - 'convict*'
          - 'husky'
          - 'vitest'
          - 'vitest-*'
          - '@vitest/*'
          - 'nodemon'
          - 'npm-run-all'

      types:
        patterns:
          - '@types/*'

    ignore:
      - dependency-name: 'eslint-*'
      - dependency-name: 'eslint'

    # Schedule run every Monday, local time
    schedule:
      interval: weekly
      time: '10:30'
      timezone: 'Europe/London'
    # Delay a PR for a package update by 5 days
    cooldown:
      default-days: 5
    versioning-strategy: increase

    allow:
      # Include direct package.json updates
      - dependency-type: direct

  # Update GitHub Actions
  - package-ecosystem: github-actions
    directory: /

    # Schedule run every Monday, local time
    schedule:
      interval: weekly
      time: '10:30'
      timezone: 'Europe/London'
    # Delay a PR for an action update by 5 days
    cooldown:
      default-days: 5
