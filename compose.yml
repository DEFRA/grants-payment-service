services:
  grants-payment-localstack:
    image: localstack/localstack:3.0.2
    ports:
      - '4569:4566' # LocalStack Gateway
      - '4570-4619:4510-4559' # external services port range
    env_file:
      - 'compose/aws.env'
    environment:
      DEBUG: ${DEBUG:-1}
      LS_LOG: WARN # Localstack DEBUG Level
      SERVICES: s3,sqs,sns,firehose
      LOCALSTACK_HOST: grants-payment-localstack
      MONITOR_SQS: ${MONITOR_SQS:-true}
    volumes:
      - '${TMPDIR:-/tmp}/localstack:/var/lib/localstack'
      - ./compose/start-localstack.sh:/etc/localstack/init/ready.d/start-localstack.sh
      - ./compose/monitor-sqs.sh:/etc/localstack/init/ready.d/monitor-sqs.sh
      - ./compose/view-localstack.sh:/opt/code/localstack/bin/view-localstack.sh
    healthcheck:
      test: ['CMD', 'curl', 'localhost:4566']
      interval: 5s
      start_period: 5s
      retries: 3
    networks:
      - cdp-tenant

  mongodb:
    image: mongo:6.0.13
    networks:
      - cdp-tenant
    ports:
      - '27018:27017'
    volumes:
      - mongodb-data:/data
    restart: always

  grants-payment-service:
    build:
      context: .
      target: development
    ports:
      - '3557:3557'
    links:
      - 'grants-payment-localstack:grants-payment-localstack'
      - 'mongodb:mongodb'
    depends_on:
      grants-payment-localstack:
        condition: service_healthy
      mongodb:
        condition: service_started
    env_file:
      - 'compose/aws.env'
    environment:
      PORT: 3557
      NODE_ENV: development
      LOCALSTACK_ENDPOINT: http://grants-payment-localstack:4566
      MONGO_URI: mongodb://mongodb:27017/
    networks:
      - cdp-tenant
    volumes:
      - ./src:/home/node/src
      - ./package.json:/home/node/package.json

################################################################################

volumes:
  mongodb-data:

networks:
  cdp-tenant:
    driver: bridge
    name: cdp-tenant
